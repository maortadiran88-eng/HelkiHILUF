// ── Firebase ──
async function fbLoad() {
  const md = await db.collection('catalog').doc('meta').get();
  if (!md.exists) return null;
  const d = md.data().d;
  const mids = [];
  d.brands.forEach(b => b.categories.forEach(c => c.models.forEach(m => mids.push(m.id))));
  if (!mids.length) return d;
  const chunks = [];
  for (let i = 0; i < mids.length; i += 20) chunks.push(mids.slice(i, i+20));
  const allD = [];
  for (const ch of chunks) {
    const docs = await Promise.all(ch.map(id => db.collection('parts').doc(id).get()));
    allD.push(...docs);
  }
  const pm = {};
  allD.forEach(doc => { if (doc.exists) pm[doc.id] = doc.data(); });
  d.brands.forEach(b => b.categories.forEach(c => c.models.forEach(m => {
    const pd = pm[m.id] || {};
    m.parts = (pd.parts || []).map(p => ({disc:false,tags:'',pinned:false,...p}));
    m.images = pd.images || []; m.columns = pd.columns || DCOLS();
    m.synonyms = pd.synonyms || []; m.notes = pd.notes || ''; m.seriesGroup = m.seriesGroup || pd.seriesGroup || '';
  })));
  return d;
}

async function fbSave(data, mids) {
  const meta = {
    pass:data.pass, editorPass:data.editorPass, viewerPass:data.viewerPass,
    waDefaults:data.waDefaults||['nameHe','tadPn'],
    welcomeTitle:data.welcomeTitle, welcomeSub:data.welcomeSub,
    disclaimer:data.disclaimer, news:data.news||'',
    brands:data.brands.map(b => ({...b, categories:b.categories.map(c => ({...c, models:c.models.map(m => ({id:m.id,name:m.name,seriesGroup:m.seriesGroup||''}))}))}))
  };
  await db.collection('catalog').doc('meta').set({d:meta});
  const batch = db.batch();
  data.brands.forEach(b => b.categories.forEach(c => c.models.forEach(m => {
    if (!mids.has(m.id)) return;
    batch.set(db.collection('parts').doc(m.id), {
      parts:m.parts||[], images:m.images||[], columns:m.columns||DCOLS(),
      synonyms:m.synonyms||[], notes:m.notes||'', seriesGroup:m.seriesGroup||''
    });
  })));
  await batch.commit();
}

async function compressImg(file) {
  return new Promise(res => {
    const r = new FileReader();
    r.onload = e => {
      const img = new Image();
      img.onload = () => {
        const c = document.createElement('canvas');
        let w = img.width, h = img.height, M = 1200;
        if (w>M||h>M) { const r=Math.min(M/w,M/h); w=Math.round(w*r); h=Math.round(h*r); }
        c.width=w; c.height=h; c.getContext('2d').drawImage(img,0,0,w,h);
        res(c.toDataURL('image/jpeg',.72));
      };
      img.src = e.target.result;
    };
    r.readAsDataURL(file);
  });
}

function fuzzy(q, text) {
  const n = s => s.toLowerCase().replace(/[\s\-_'"]/g,'');
  const nq=n(q), nt=n(text);
  if (!nq) return false;
  if (nt.includes(nq)) return true;
  if (nq.length>=3) { for (let i=0;i<nq.length;i++) { if (nt.includes(nq.slice(0,i)+nq.slice(i+1))) return true; } }
  return false;
}
function partMatch(q, p) {
  const qs = q.trim().toLowerCase().split(/\s+/);
  const txt = [...Object.values(p.values), p.tags||''].join(' ').toLowerCase();
  return qs.every(qp => fuzzy(qp, txt));
}

function Ticker({text}) {

  useEffect(()=>{
    const t=setInterval(()=>setTip(TIPS[Math.floor(Math.random()*TIPS.length)]),18000);
    return()=>clearInterval(t);
  },[]);
  const show = tip||text;
  return (
    <div style={{background:'#1a2744',color:'#a0c4ff',padding:'5px 0',overflow:'hidden',fontSize:12,flexShrink:0}}>
      <div style={{display:'flex',alignItems:'center'}}>

        <div style={{overflow:'hidden',flex:1}}>
          <div key={show} style={{animation:'ticker 22s linear infinite',display:'inline-block',paddingRight:60}}>{show}</div>
        </div>
      </div>
    </div>
  );
}

    data.brands.forEach(b=>b.categories.forEach(c=>c.models.forEach(m=>{
      const ms=m.synonyms?.find(s=>fuzzy(q,s));
      const mh=fuzzy(q,m.name)||!!ms;
      const ph=m.parts.filter(p=>partMatch(q,p));
      if((mh||ph.length)&&!seen.has(m.id)){seen.add(m.id);res.push({b,c,m,ph,ms:ms||null});}
    })));
    return res;
  },[query,data,role]);

  const nav=(bid,cid,mid,hq='')=>{

  const handleImgUpload=async(e,bid,cid,mid)=>{const files=Array.from(e.target.files);if(!files.length)return;const b64=await Promise.all(files.map(compressImg));mutM(bid,cid,mid,m=>({...m,images:[...(m.images||[]),...b64]}));};
  const addToCart=(bid,cid,mid,pid)=>{

    setCart(prev=>[...prev,{id:gid(),bid,cid,mid,pid,modelName:m.name,brandName:b.name,brandColor:b.color,catName:c.name,values:{...p.values},columns:m.columns}]);

  const moveModel=(fBid,fCid,mid,toBid,toCid)=>{

    mut(d=>{const brands=d.brands.map(b=>{if(b.id!==fBid)return b;return{...b,categories:b.categories.map(c=>{if(c.id!==fCid)return c;moved=c.models.find(m=>m.id===mid);return{...c,models:c.models.filter(m=>m.id!==mid)};})};});if(!moved)return d;return{...d,brands:brands.map(b=>b.id!==toBid?b:{...b,categories:b.categories.map(c=>c.id!==toCid?c:{...c,models:[...c.models,moved]})})};});

  };
  const bulkMove=(sels,toBid,toCid)=>{

  };
  const bulkDel=async(sels)=>{
    if(!confirm(`למחוק ${sels.length} דגמים לצמיתות?`))return;
    try{await Promise.all(sels.map(s=>db.collection('parts').doc(s.mid).delete().catch(()=>{})));}catch{}
    mut(d=>({...d,brands:d.brands.map(b=>({...b,categories:b.categories.map(c=>({...c,models:c.models.filter(m=>!sels.some(s=>s.mid===m.id&&s.bid===b.id&&s.cid===c.id))}))}))}));

  const dupModel=(bid,cid,mid)=>{const orig=data.brands.find(b=>b.id===bid)?.categories.find(c=>c.id===cid)?.models.find(m=>m.id===mid);if(!orig)return;const nid=gid();changedMids.current.add(nid);const dup={...JSON.parse(JSON.stringify(orig)),id:nid,name:orig.name+' (עותק)',synonyms:[]};mut(d=>({...d,brands:d.brands.map(b=>b.id!==bid?b:{...b,categories:b.categories.map(c=>c.id!==cid?c:{...c,models:[...c.models,dup]})})}));};
  const copyPartsFrom=(sb,sc,sm,db2,dc,dm)=>{const src=data.brands.find(b=>b.id===sb)?.categories.find(c=>c.id===sc)?.models.find(m=>m.id===sm);if(!src)return;changedMids.current.add(dm);mutM(db2,dc,dm,m=>({...m,parts:[...m.parts,...src.parts.map(p=>({...p,id:gid()}))]}));};

  };

  const expXLS=()=>{
    if(!data)return;
    try{
      const wb=XLSX.utils.book_new();
      const all=[['מותג','קטגוריה','סדרה','שם דגם','שם חלק עברית','שם חלק אנגלית','מק"ט יצרן','מק"ט תדיראן','הופסק']];

        const rows=m.parts.map(p=>{const r=[p.values.nameHe||'',p.values.nameEn||'',p.values.mfgPn||'',p.values.tadPn||'',p.disc?'הופסק':''];xc.forEach(x=>r.push(p.values[x.id]||''));return r;});

        try{XLSX.utils.book_append_sheet(wb,ws,sn);}catch{XLSX.utils.book_append_sheet(wb,ws,'m_'+gid().slice(0,8));}
        m.parts.forEach(p=>all.push([b.name,c.name,m.seriesGroup||'',m.name,p.values.nameHe||'',p.values.nameEn||'',p.values.mfgPn||'',p.values.tadPn||'',p.disc?'הופסק':'']));
      })));
      XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(all),'כל הנתונים');
      if(!wb.SheetNames.length){alert('אין נתונים לייצוא');return;}
      XLSX.writeFile(wb,`catalog-${new Date().toISOString().slice(0,10)}.xlsx`);
    }catch(e){alert('שגיאה: '+e.message);console.error(e);}
  };
  const expJSON=()=>{const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));a.download=`backup-${new Date().toISOString().slice(0,10)}.json`;a.click();};
  const impFile=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);d.brands?.forEach(b=>b.categories?.forEach(c=>c.models?.forEach(m=>changedMids.current.add(m.id))));setData(d);setSel(null);alert('✅ נטען');}catch{alert('❌ שגיאה');}};r.readAsText(f);e.target.value='';};

  if(!loaded) return (
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',flexDirection:'column',gap:16,background:'#0f172a'}}>
      <div style={{fontSize:52}}>🔧</div>
      <div style={{fontSize:17,color:'#94a3b8'}}>מתחבר לשרת...</div>
      <div style={{width:40,height:40,border:'4px solid #334155',borderTop:'4px solid #1565c0',borderRadius:'50%',animation:'spin .9s linear infinite'}}/>
    </div>
  );
  if(!role) return <LoginScreen data={data} onLogin={setRole}/>;

  const hdrBg = brand?.color||'#37474f';
  const notifCount = (reports.filter(r=>!r.resolved).length) + missingAlerts.length;

  return (

      <header ref={hdrRef} style={{background:hdrBg,color:'#fff',padding:'10px 12px',display:'flex',alignItems:'center',gap:7,boxShadow:'0 2px 8px rgba(0,0,0,.25)',position:'sticky',top:22,zIndex:200,flexWrap:'wrap',transition:'background .3s'}}>
        <button onClick={()=>setSidebar(v=>!v)} style={B('rgba(255,255,255,.2)')}>☰</button>
        <button onClick={goHome} style={{...B('rgba(255,255,255,.2)'),fontSize:15}}>🏠</button>
        {sel && <button onClick={goBack} style={B('rgba(255,255,255,.2)')}>◀</button>}
        <span style={{fontWeight:'bold',fontSize:14,flexShrink:0}}>🔧 חלקי חילוף</span>
        <span style={{fontSize:11,color:'rgba(255,255,255,.75)',flexShrink:0,fontFamily:'monospace'}}>{now.toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'})}</span>
        {saving==='saving'&&<span style={{fontSize:11,color:'rgba(255,255,255,.8)',flexShrink:0}}>💾...</span>}
        {saving==='saved'&&<span style={{fontSize:11,color:'#a5d6a7',flexShrink:0}}>✓ נשמר</span>}
        {saving==='error'&&<button onClick={()=>alert('שגיאת שמירה:\n'+saveErr)} style={{fontSize:11,color:'#fff',background:'#e53935',border:'none',borderRadius:5,padding:'3px 8px',cursor:'pointer',flexShrink:0}}>⚠ שגיאה</button>}
        <div style={{flex:'1 1 130px',position:'relative',minWidth:90}}>
          <input value={query} onChange={e=>setQuery(e.target.value)} placeholder="🔍 חיפוש גלובלי..."
            style={{width:'100%',padding:'7px 28px 7px 10px',borderRadius:20,border:'none',fontSize:13,outline:'none',color:'#222',background:'#fff'}}/>
          {query&&<button onClick={()=>setQuery('')} style={{position:'absolute',left:6,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',color:'#999',fontSize:15}}>✕</button>}
        </div>
        <button onClick={()=>setShowHelp(true)} style={B('rgba(255,255,255,.2)')}>❓</button>
        <button onClick={()=>setShowCart(true)} style={{...B('rgba(255,255,255,.2)'),position:'relative'}}>
          🛒{cart.length>0&&<span style={{position:'absolute',top:-4,left:-4,background:'#e53935',color:'#fff',borderRadius:'50%',width:16,height:16,fontSize:10,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:'bold'}}>{cart.length}</span>}
        </button>

          <div style={{padding:'8px 14px',borderBottom:'1px solid var(--border)',color:'var(--sub)',fontSize:12,display:'flex',alignItems:'center',justifyContent:'space-between'}}>

            <button onClick={()=>setQuery('')} style={{background:'#e53935',border:'none',borderRadius:5,color:'#fff',padding:'3px 10px',cursor:'pointer',fontSize:12}}>✕ סגור</button>

              onMouseEnter={e=>e.currentTarget.style.background='var(--r2)'} onMouseLeave={e=>e.currentTarget.style.background='var(--card)'}>

                <span style={{fontWeight:'bold',color:'var(--text)',fontSize:14}}>{r.m.name}</span>
                {r.m.synonyms?.map((s,si)=>(
                  <span key={si} style={{background:r.ms===s?'#1565c0':'var(--r2)',color:r.ms===s?'#fff':'var(--sub)',padding:'1px 7px',borderRadius:4,fontSize:11,border:'1px solid var(--border)'}}>
                    {r.ms===s?'≡ ':''}{s}

                onAddModel={(cid,name,sg)=>{const id=gid();changedMids.current.add(id);const nm={id,name,synonyms:[],images:[],notes:'',seriesGroup:sg||'',columns:DCOLS(),parts:[]};mut(d=>({...d,brands:d.brands.map(bb=>bb.id!==b.id?bb:{...bb,categories:bb.categories.map(c=>c.id!==cid?c:{...c,models:[...c.models,nm]})})}));}}

      {showNotif&&<NotifModal missingAlerts={missingAlerts} reports={reports} onNav={(bid,cid,mid)=>{nav(bid,cid,mid);setShowNotif(false);}} onResolve={async id=>{await fbResolveReport(id);fbGetReports().then(setReports);}} onClose={()=>setShowNotif(false)}/>}
      {showHist&&<Modal onClose={()=>setShowHist(false)} title="📋 לוג שינויים" wide>

          {!histData.length&&<div style={{textAlign:'center',color:'var(--sub)',padding:30}}>אין רשומות</div>}

            <div key={h.id||i} style={{display:'flex',gap:10,padding:'9px 0',borderBottom:'1px solid var(--border)'}}>
              <div style={{flex:1}}><div style={{fontWeight:'bold',fontSize:13}}>{h.action}</div><div style={{fontSize:11,color:'var(--sub)'}}>{h.model&&`דגם: ${h.model} · `}{h.brand&&`מותג: ${h.brand} · `}תפקיד: {h.role}</div></div>
              <div style={{fontSize:10,color:'var(--sub)'}}>{h.ts}</div>
            </div>
          ))}
        </div>
        <button onClick={()=>setShowHist(false)} style={{width:'100%',marginTop:14,...BS}}>סגור</button>

      {chPwd&&<SettingsModal data={data} onSave={d=>{mut(()=>({...d}));setChPwd(false);alert('✅ נשמר');}} onClose={()=>setChPwd(false)}/>}
      {brandMgr&&<BrandMgr data={data} onSave={brands=>{mut(d=>({...d,brands}));setBrandMgr(false);}} onClose={()=>setBrandMgr(false)}/>}
      {showXls&&<XlsModal data={data} onImport={importXls} onClose={()=>setShowXls(false)}/>}
      {showBulkMove&&<BulkMoveModal data={data} onMove={bulkMove} onClose={()=>setShowBulkMove(false)}/>}
      {showBulkDel&&<BulkDelModal data={data} onDelete={bulkDel} onClose={()=>setShowBulkDel(false)}/>}
    </div>
  );
}

function HomeScreen({data, onNav, recent, favs, onToggleFav}) {
  const total = data.brands.reduce((s,b)=>s+b.categories.reduce((ss,c)=>ss+c.models.length,0),0);
  const totalParts = data.brands.reduce((s,b)=>s+b.categories.reduce((ss,c)=>ss+c.models.reduce((sss,m)=>sss+m.parts.length,0),0),0);
  const [open,setOpen] = useState(null);
  const fmtTime = ts => { const d=Math.floor((Date.now()-ts)/60000); if(d<1)return'עכשיו'; if(d<60)return`לפני ${d} דק'`; if(d<1440)return`לפני ${Math.floor(d/60)} שע'`; return new Date(ts).toLocaleDateString('he-IL',{day:'2-digit',month:'2-digit'}); };
  const recentM = recent.slice(0,6).map(rv=>{const b=data.brands.find(x=>x.id===rv.bid);const c=b?.categories.find(x=>x.id===rv.cid);const m=c?.models.find(x=>x.id===rv.mid);if(!b||!c||!m)return null;return{b,c,m,ts:rv.ts};}).filter(Boolean);
  const favM = [];data.brands.forEach(b=>b.categories.forEach(c=>c.models.forEach(m=>{if(favs.has(m.id))favM.push({b,c,m});})));

    <div>
      <div style={{display:'flex',gap:10,marginBottom:16,flexWrap:'wrap'}}>
        {[['❄️','דגמים',total,'#1565c0'],['🔩','חלקים',totalParts.toLocaleString(),'#2e7d32'],['🏷️','מותגים',data.brands.length,'#6a1b9a']].map(([ic,lb,v,col])=>(
          <div key={lb} style={{background:'var(--card)',borderRadius:12,padding:'12px 16px',flex:'1 1 90px',boxShadow:'0 1px 4px var(--sh)',display:'flex',alignItems:'center',gap:10}}>
            <span style={{fontSize:24}}>{ic}</span><div><div style={{fontSize:18,fontWeight:'bold',color:col}}>{v}</div><div style={{fontSize:11,color:'var(--sub)'}}>{lb}</div></div>

      </div>
      {favM.length>0&&(
        <div style={{marginBottom:16}}>
          <div style={{fontWeight:'bold',fontSize:13,color:'var(--sub)',marginBottom:8}}>⭐ מועדפים</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(148px,1fr))',gap:8}}>
            {favM.map(({b,c,m})=>(
              <div key={m.id} style={{background:'var(--card)',borderRadius:10,padding:'11px 13px',boxShadow:'0 1px 4px var(--sh)',borderRight:`4px solid ${b.color}`,position:'relative',transition:'all .15s',cursor:'pointer'}}
                onMouseEnter={e=>e.currentTarget.style.transform='translateY(-2px)'} onMouseLeave={e=>e.currentTarget.style.transform=''}>
                <button onClick={e=>{e.stopPropagation();onToggleFav(m.id);}} style={{position:'absolute',top:6,left:8,background:'none',border:'none',fontSize:14,cursor:'pointer'}}>⭐</button>
                <div onClick={()=>onNav(b.id,c.id,m.id)} style={{paddingLeft:18}}>
                  <div style={{fontWeight:'bold',color:'var(--text)',fontSize:12,marginBottom:2}}>{m.name}</div>
                  {m.seriesGroup&&<div style={{fontSize:9,color:'#6a1b9a',marginBottom:2}}>{m.seriesGroup}</div>}
                  <div style={{fontSize:10,color:'var(--sub)',marginBottom:2}}>{b.name} · {c.name}</div>
                  <div style={{fontSize:11,color:b.color,fontWeight:'bold'}}>{m.parts.length} חלקים</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}
      {recentM.length>0&&(
        <div style={{marginBottom:16}}>
          <div style={{fontWeight:'bold',fontSize:13,color:'var(--sub)',marginBottom:8}}>🕐 נצפו לאחרונה</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(148px,1fr))',gap:8}}>
            {recentM.map(({b,c,m,ts})=>(
              <div key={m.id} onClick={()=>onNav(b.id,c.id,m.id)} style={{background:'var(--card)',borderRadius:10,padding:'11px 13px',cursor:'pointer',boxShadow:'0 1px 4px var(--sh)',borderRight:`4px solid ${b.color}`,transition:'all .15s'}}
                onMouseEnter={e=>e.currentTarget.style.transform='translateY(-2px)'} onMouseLeave={e=>e.currentTarget.style.transform=''}>
                <div style={{fontSize:10,color:'var(--sub)',marginBottom:2}}>{fmtTime(ts)}</div>
                <div style={{fontWeight:'bold',color:'var(--text)',fontSize:12,marginBottom:2}}>{m.name}</div>
                {m.seriesGroup&&<div style={{fontSize:9,color:'#6a1b9a',marginBottom:2}}>{m.seriesGroup}</div>}
                <div style={{fontSize:10,color:'var(--sub)',marginBottom:2}}>{b.name} · {c.name}</div>
                <div style={{fontSize:11,color:b.color,fontWeight:'bold'}}>{m.parts.length} חלקים</div>

            ))}

        </div>

      <div style={{fontWeight:'bold',fontSize:13,color:'var(--sub)',marginBottom:10}}>📁 לפי מותג וסדרה</div>
      {data.brands.map(b=>{

              {b.categories.filter(c=>c.models.length>0).map(c=>{
                const groups={};c.models.forEach(m=>{const sg=m.seriesGroup||'כללי';if(!groups[sg])groups[sg]=[];groups[sg].push(m);});
                return (
                  <div key={c.id} style={{marginBottom:12}}>

                    {Object.entries(groups).map(([sg,models])=>(
                      <div key={sg} style={{marginBottom:8}}>

                        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(135px,1fr))',gap:6}}>
                          {models.map(m=>(

                              onMouseEnter={e=>e.currentTarget.style.background=b.color+'33'} onMouseLeave={e=>e.currentTarget.style.background=b.light+'88'}>
                              <button onClick={ev=>{ev.stopPropagation();onToggleFav(m.id);}} style={{position:'absolute',top:4,left:6,background:'none',border:'none',fontSize:12,cursor:'pointer'}}>{favs.has(m.id)?'⭐':'☆'}</button>

                              </div>
                            </div>
                          ))}
                        </div>
                      </div>
                    ))}
                  </div>
                );
              })}
            </div>}
          </div>
        );
      })}
    </div>
  );
}

                     <span style={{flex:1}}>{c.name}</span><span style={{fontSize:10}}>{openCats[c.id]?'▲':'▼'}</span>

                    <input value={newSG} onChange={e=>setNewSG(e.target.value)} placeholder="סדרה (אופציונלי: VRF5, Mini...)" style={{width:'100%',border:'1px solid var(--border)',borderRadius:4,padding:'4px 8px',fontSize:11,color:'var(--inp)',background:'var(--ibg)',marginBottom:4,boxSizing:'border-box'}}/>

                  </div>

              </>}
            </div>
          );
        })}
        {admin&&(addingCat
          ?<div style={{padding:'6px 10px',background:'var(--r2)',display:'flex',gap:6}}>
             <input value={newCat} autoFocus onChange={e=>setNewCat(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'&&newCat.trim()){onAddCat(newCat.trim());setNewCat('');setAddingCat(false);}if(e.key==='Escape')setAddingCat(false);}} placeholder="שם קטגוריה..." style={{flex:1,border:'1px solid var(--border)',borderRadius:4,padding:'5px 8px',fontSize:12,color:'var(--inp)',background:'var(--ibg)'}}/>
             <button onClick={()=>{if(newCat.trim()){onAddCat(newCat.trim());setNewCat('');setAddingCat(false);}}} style={{background:brand.color,color:'#fff',border:'none',borderRadius:4,padding:'5px 10px',cursor:'pointer',fontSize:12}}>הוסף</button>
             <button onClick={()=>setAddingCat(false)} style={{background:'var(--border)',border:'none',borderRadius:4,padding:'5px 8px',cursor:'pointer',fontSize:12,color:'var(--text)'}}>✕</button>
           </div>
          :<button onClick={()=>setAddingCat(true)} style={{width:'100%',padding:'8px',background:'none',border:'none',borderTop:'1px dashed var(--border)',color:brand.color,cursor:'pointer',fontSize:12,fontWeight:'bold'}}>+ הוסף קטגוריה</button>
        )}
      </>}
    </div>
  );
}

  const [selRows,setSelRows] = useState(new Set());
  const [showWa,setShowWa] = useState(false);

  useEffect(()=>{if(q&&hiRef.current)setTimeout(()=>hiRef.current?.scrollIntoView({behavior:'smooth',block:'center'}),200);},[q]);

  const saveSyn=()=>{onUpdate({synonyms:synIn.split(',').map(s=>s.trim()).filter(Boolean)});setEditSyn(false);};
  const visCols = useMemo(()=>editor?model.columns:model.columns.filter(col=>model.parts.some(p=>(p.values[col.id]||'').trim()!=='')),[model.columns,model.parts,editor]);

  let filtered = [...model.parts.filter(p=>p.pinned),...model.parts.filter(p=>!p.pinned)];
  if(filter.trim()) filtered=filtered.filter(p=>partMatch(filter,p));
  if(sortCol){filtered=[...filtered].sort((a,b)=>{const va=(a.values[sortCol.id]||'').toLowerCase();const vb=(b.values[sortCol.id]||'').toLowerCase();const n=va.localeCompare(vb,'he');return sortCol.dir==='asc'?n:-n;});}

  const rowHi=p=>q&&Object.values(p.values).some(v=>String(v).toLowerCase().includes(q));
  const cellHi=v=>q&&String(v).toLowerCase().includes(q);
  const toggleRow=id=>setSelRows(p=>{const n=new Set(p);n.has(id)?n.delete(id):n.add(id);return n;});
  const clearRows=()=>setSelRows(new Set());
  const handleSort=cid=>{if(!sortCol||sortCol.id!==cid)setSortCol({id:cid,dir:'asc'});else if(sortCol.dir==='asc')setSortCol({id:cid,dir:'desc'});else setSortCol(null);};
  const si=cid=>!sortCol||sortCol.id!==cid?'⇅':sortCol.dir==='asc'?'↑':'↓';

  const submitPaste=()=>{const rows=pasteText.trim().split('\n').map(r=>r.split('\t').map(c=>c.trim())).filter(r=>r.some(c=>c));if(rows.length){onPaste(rows);setPasteText('');setShowPaste(false);}};

  const exportPDF=()=>{
    const w=window.open('','_blank');
    const rows=model.parts.map(p=>`<tr style="${p.disc?'color:#c62828':p.pinned?'background:#fff8e1':''}">${visCols.map(c=>`<td>${p.values[c.id]||''}</td>`).join('')}<td>${p.disc?'⛔':''}</td></tr>`).join('');
    const imgs=images.map(img=>`<img src="${img}" style="max-width:280px;max-height:200px;border:1px solid #ddd;border-radius:6px;margin:4px;object-fit:contain">`).join('');
    w.document.write(`<!DOCTYPE html><html dir="rtl"><head><meta charset="UTF-8"><title>${model.name}</title><style>body{font-family:Arial;padding:30px;direction:rtl}h1{color:${brand.color}}table{border-collapse:collapse;width:100%;margin-top:14px;font-size:13px}th{background:${brand.color};color:#fff;padding:8px 12px;text-align:right}td{border:1px solid #e5e7eb;padding:6px 10px}@page{margin:20mm}</style></head><body><h1>🔧 ${brand.name} — ${model.name}</h1><p style="color:#6b7280">${cat.name}${model.synonyms?.length?' · '+model.synonyms.join(', '):''}</p>${model.notes?`<div style="background:#fff3f3;border-right:4px solid #e53935;padding:10px;margin:10px 0;color:#e53935;font-weight:bold">${model.notes}</div>`:''}<div style="display:flex;flex-wrap:wrap;gap:8px;margin:12px 0">${imgs}</div><table><thead><tr>${visCols.map(c=>`<th>${c.name}</th>`).join('')}<th>סטטוס</th></tr></thead><tbody>${rows}</tbody></table><p style="font-size:11px;color:#aaa;margin-top:8px">${model.parts.length} חלקים · ${new Date().toLocaleDateString('he-IL')}</p><script>window.onload=()=>window.print();<\/script></body></html>`);
    w.document.close();
  };
  const exportXLS=()=>{const wb=XLSX.utils.book_new();const ws=XLSX.utils.aoa_to_sheet([model.columns.map(c=>c.name),...model.parts.map(p=>model.columns.map(c=>p.values[c.id]||''))]);XLSX.utils.book_append_sheet(wb,ws,model.name.slice(0,31));XLSX.writeFile(wb,`${brand.name}-${model.name}.xlsx`);};
  const shareLink=()=>{const url=window.location.href.split('?')[0]+`?b=${brand.id}&c=${cat.id}&m=${model.id}`;navigator.clipboard?.writeText(url).then(()=>alert('✅ קישור הועתק')).catch(()=>alert('קישור:\n'+url));};

  let hiSet=false;

  if(quickMode){
    const qc=visCols.filter(c=>['nameHe','tadPn','mfgPn'].includes(c.id));
    const dc=qc.length?qc:visCols.slice(0,3);
    return (
      <div style={{maxWidth:600,margin:'0 auto'}}>
        <div style={{background:brand.color,color:'#fff',borderRadius:12,padding:'12px 16px',marginBottom:12,display:'flex',alignItems:'center',gap:10}}>
          <div style={{flex:1}}><div style={{fontWeight:'bold',fontSize:16}}>◈ {model.name}</div><div style={{fontSize:12,opacity:.8}}>{cat.name} · {model.parts.length} חלקים</div></div>
          <button onClick={()=>setQuickMode(false)} style={{background:'rgba(255,255,255,.25)',border:'none',color:'#fff',borderRadius:8,padding:'6px 12px',cursor:'pointer',fontSize:12,fontWeight:'bold'}}>📋 מלא</button>
        </div>
        {model.notes&&<div style={{background:'#ffebee',borderRadius:10,padding:'10px 14px',marginBottom:10,color:'#e53935',fontWeight:'bold',fontSize:13,border:'2px solid #e53935'}}>{model.notes}</div>}
        <input value={filter} onChange={e=>setFilter(e.target.value)} placeholder="🔍 חיפוש..." style={{width:'100%',border:'1px solid var(--border)',borderRadius:20,padding:'9px 14px',fontSize:14,outline:'none',color:'var(--inp)',background:'var(--ibg)',boxSizing:'border-box',marginBottom:10}}/>
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          {filtered.map(p=>(
            <div key={p.id} onClick={()=>toggleRow(p.id)} style={{background:selRows.has(p.id)?'var(--sel)':p.disc?'#ffebee':'var(--card)',borderRadius:10,padding:'12px 14px',boxShadow:'0 1px 4px var(--sh)',borderRight:`4px solid ${p.disc?'#e53935':selRows.has(p.id)?'#25D366':brand.color}`,cursor:'pointer'}}>
              {p.pinned&&<div style={{fontSize:10,color:'#e65100',fontWeight:'bold',marginBottom:3}}>📌 חלק נפוץ</div>}
              {p.disc&&<div style={{fontSize:12,color:'#e53935',fontWeight:'bold',marginBottom:4,background:'#ffebee',padding:'3px 8px',borderRadius:6,display:'inline-block'}}>⛔ הופסק לייצור</div>}
              {dc.map(col=>{const v=(p.values[col.id]||'').trim();if(!v)return null;return(<div key={col.id} style={{display:'flex',justifyContent:'space-between',marginBottom:3,fontSize:13}}><span style={{color:'var(--sub)',marginLeft:10}}>{col.name}:</span><span style={{fontWeight:'bold',color:p.disc?'#e53935':'var(--text)'}}>{v}</span></div>);})}
            </div>
          ))}
          {!filtered.length&&<div style={{textAlign:'center',padding:40,color:'var(--sub)'}}>אין תוצאות</div>}
        </div>
        {selRows.size>0&&(
          <div style={{position:'fixed',bottom:16,right:16,left:16,zIndex:100,background:'#25D366',borderRadius:14,padding:'13px 18px',display:'flex',alignItems:'center',gap:10,boxShadow:'0 6px 20px rgba(0,0,0,.3)'}}>
            <span style={{color:'#fff',fontWeight:'bold',flex:1}}>✓ {selRows.size} נבחרו</span>
            <button onClick={()=>setShowWa(true)} style={{background:'#fff',border:'none',borderRadius:8,padding:'8px 16px',cursor:'pointer',fontWeight:'bold',color:'#25D366',fontSize:13}}>📱 שלח</button>
            <button onClick={clearRows} style={{background:'rgba(255,255,255,.25)',border:'none',borderRadius:8,padding:'8px 12px',cursor:'pointer',color:'#fff',fontSize:12}}>✕</button>
          </div>
        )}
        {showWa&&<WaModal brand={brand} cat={cat} model={model} selRows={selRows} waDefaults={waDefaults} onClose={()=>setShowWa(false)}/>}
      </div>
    );
  }

  return (
    <div style={{maxWidth:1100,margin:'0 auto'}}>
      {/* Header */}
      <div style={{background:'var(--card)',borderRadius:12,padding:'14px 16px',marginBottom:12,boxShadow:'0 1px 4px var(--sh)'}}>
        <div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap',marginBottom:8}}>
          <span style={{background:brand.color,color:'#fff',padding:'3px 10px',borderRadius:20,fontSize:12,fontWeight:'bold'}}>{brand.name}</span>
          <span style={{color:'var(--sub)',fontSize:12}}>{cat.name}</span>
          {model.seriesGroup&&<span style={{background:'#f3e5f5',color:'#6a1b9a',padding:'2px 8px',borderRadius:12,fontSize:11,fontWeight:'bold'}}>{model.seriesGroup}</span>}
          <span style={{fontSize:17,fontWeight:'bold',color:'var(--text)'}}>◈ {model.name}</span>
          <button onClick={()=>onToggleFav(model.id)} style={{background:'none',border:'none',fontSize:20,cursor:'pointer',marginRight:'auto'}}>{favs.has(model.id)?'⭐':'☆'}</button>
          <span style={{color:'var(--sub)',fontSize:11}}>{model.parts.length.toLocaleString()} חלקים</span>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap',fontSize:12,marginBottom:8}}>
          <span style={{color:'var(--sub)'}}>שמות נרדפים:</span>
          {!editSyn
            ?<><span style={{color:'var(--text)'}}>{model.synonyms?.length?model.synonyms.join(' | '):'—'}</span>{editor&&<button onClick={()=>setEditSyn(true)} style={S(brand.color)}>✏</button>}</>
            :<><input value={synIn} onChange={e=>setSynIn(e.target.value)} placeholder="שם1, שם2" style={{border:'1px solid var(--border)',borderRadius:4,padding:'3px 8px',fontSize:12,width:200,color:'var(--inp)',background:'var(--ibg)'}}/>
               <button onClick={saveSyn} style={S('#4caf50')}>✓</button><button onClick={()=>setEditSyn(false)} style={S('#9e9e9e')}>✕</button></>
          }
        </div>
        {editor&&<div style={{display:'flex',alignItems:'center',gap:8,fontSize:12,marginBottom:8}}>
          <span style={{color:'var(--sub)'}}>סדרה:</span>
          <input value={model.seriesGroup||''} onChange={e=>onUpdate({seriesGroup:e.target.value})} placeholder="VRF5, Mini, High Wall..." style={{border:'1px solid var(--border)',borderRadius:4,padding:'3px 8px',fontSize:12,width:220,color:'var(--inp)',background:'var(--ibg)'}}/>
        </div>}
        <div style={{display:'flex',gap:6,flexWrap:'wrap',borderTop:'1px solid var(--border)',paddingTop:10}}>
          <button onClick={exportPDF}    style={S('#546e7a')}>🖨️ PDF</button>
          <button onClick={exportXLS}    style={S('#388e3c')}>📊 Excel</button>
          <button onClick={shareLink}    style={S('#7b1fa2')}>🔗 שתף</button>
          <button onClick={()=>setQuickMode(true)} style={S('#0097a7')}>📱 נייד</button>
          <button onClick={()=>setShowReport(true)} style={S('#e65100')}>⚠️ דווח שגיאה</button>
          {editor&&<>
            <button onClick={()=>setShowMove(true)} style={S('#455a64')}>🔀 העבר</button>
            <button onClick={()=>{if(confirm('לשכפל?'))onDuplicate();}} style={S('#0277bd')}>⧉ שכפל</button>
            <button onClick={()=>setShowCopy(true)} style={S('#558b2f')}>📋 העתק חלקים</button>
          </>}
        </div>
      </div>

      {/* Notes */}
      {(editor||model.notes)&&(
        <div style={{background:'var(--card)',borderRadius:12,padding:'14px 16px',marginBottom:12,boxShadow:'0 1px 4px var(--sh)',border:model.notes?'2px solid #e5393533':'none'}}>
          <div style={{fontWeight:'bold',fontSize:13,marginBottom:8}}>📝 הערות</div>
          {editor
            ?<textarea value={model.notes||''} onChange={e=>onUpdate({notes:e.target.value})} placeholder="הוסף הערות (יוצגו באדום לכולם)..." style={{width:'100%',border:'1px solid var(--border)',borderRadius:8,padding:'10px',fontSize:13,resize:'vertical',minHeight:64,color:'#e53935',background:'var(--ibg)',fontFamily:'Arial',lineHeight:1.6,boxSizing:'border-box'}}/>
            :<div style={{color:'#e53935',fontSize:14,lineHeight:1.7,fontWeight:'600',whiteSpace:'pre-wrap'}}>{model.notes}</div>}
        </div>
      )}

      {/* Images */}
      {(editor||images.length>0)&&(
        <div style={{background:'var(--card)',borderRadius:12,padding:'14px 16px',marginBottom:12,boxShadow:'0 1px 4px var(--sh)'}}>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10,flexWrap:'wrap'}}>
            <span style={{fontWeight:'bold',fontSize:14}}>📐 שרטוטים</span>
            {editor&&<><label style={{...S(brand.color),cursor:'pointer'}}>📁 העלה<input type="file" accept="image/*" multiple onChange={onImgUpload} style={{display:'none'}}/></label>
              <button onClick={()=>setEditUrl(v=>!v)} style={S('#607d8b')}>🔗 URL</button></>}
            {images.length>0&&<span style={{color:'var(--sub)',fontSize:11,marginRight:'auto'}}>{images.length} תמונות</span>}
          </div>
          {editUrl&&editor&&(
            <div style={{display:'flex',gap:8,marginBottom:10}}>
              <input value={imgUrl} onChange={e=>setImgUrl(e.target.value)} placeholder="https://..." style={{flex:1,border:'1px solid var(--border)',borderRadius:6,padding:'7px 10px',fontSize:13,color:'var(--inp)',background:'var(--ibg)'}}/>
              <button onClick={()=>{if(imgUrl.trim()){onImgUrl(imgUrl.trim());setImgUrl('');setEditUrl(false);}}} style={{background:brand.color,color:'#fff',border:'none',borderRadius:6,padding:'7px 14px',cursor:'pointer'}}>הוסף</button>
            </div>
          )}
          {images.length>0
            ?<div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(160px,1fr))',gap:8}}>
               {images.map((img,idx)=>(
                 <div key={idx} style={{borderRadius:8,overflow:'hidden',border:'2px solid var(--border)',background:'var(--r2)'}}>
                   <img src={img} alt={`שרטוט ${idx+1}`} onClick={()=>onOpenImg(images,idx)} style={{width:'100%',height:120,objectFit:'contain',cursor:'zoom-in',display:'block'}}/>
                   <div style={{padding:'3px 8px',display:'flex',alignItems:'center',justifyContent:'space-between',background:'var(--r2)',borderTop:'1px solid var(--border)'}}>
                     <span style={{fontSize:10,color:'var(--sub)'}}>תמונה {idx+1}</span>
                     {editor&&<button onClick={()=>{if(confirm('למחוק?'))onDelImg(idx);}} style={{background:'none',border:'none',color:'#e53935',cursor:'pointer',fontSize:13}}>🗑</button>}
                   </div>
                 </div>
               ))}
             </div>
            :<div style={{textAlign:'center',padding:24,background:'var(--r2)',borderRadius:8,border:'2px dashed var(--border)',color:'var(--sub)',fontSize:13}}>העלה שרטוטים</div>}
        </div>
      )}

      {/* Parts table */}
      <div style={{background:'var(--card)',borderRadius:12,padding:'14px 16px',boxShadow:'0 1px 4px var(--sh)'}}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8,flexWrap:'wrap'}}>
          <span style={{fontWeight:'bold',fontSize:14}}>🔩 רשימת חלקים</span>
          <input value={filter} onChange={e=>setFilter(e.target.value)} placeholder="חיפוש..." style={{border:'1px solid var(--border)',borderRadius:16,padding:'5px 12px',fontSize:12,outline:'none',width:120,color:'var(--inp)',background:'var(--ibg)'}}/>
          {sortCol&&<button onClick={()=>setSortCol(null)} style={S('#9e9e9e')}>↺</button>}
          {editor&&<><button onClick={onAddPart} style={{...S(brand.color),fontWeight:'bold'}}>+ שורה</button>
            <button onClick={onAddCol} style={S('#607d8b')}>+ עמודה</button>
            <button onClick={()=>setShowPaste(v=>!v)} style={S('#e65100')}>📋 הדבק</button></>}
          <span style={{marginRight:'auto',color:'var(--sub)',fontSize:11}}>{filtered.length.toLocaleString()}/{model.parts.length.toLocaleString()}</span>
        </div>

        {selRows.size>0&&(
          <div style={{position:'sticky',bottom:12,zIndex:100,background:'#25D366',borderRadius:12,padding:'11px 16px',display:'flex',alignItems:'center',gap:10,boxShadow:'0 4px 16px rgba(0,0,0,.25)',marginBottom:12,flexWrap:'wrap',animation:'fadeIn .2s'}}>
            <span style={{color:'#fff',fontWeight:'bold',fontSize:13,flex:1}}>✓ {selRows.size} נבחרו</span>
            <button onClick={()=>setShowWa(true)} style={{background:'#fff',border:'none',borderRadius:8,padding:'7px 16px',cursor:'pointer',fontWeight:'bold',color:'#25D366',fontSize:13}}>✏️ ערוך ושלח</button>
            <button onClick={()=>{selRows.forEach(pid=>onAddToCart(brand.id,cat.id,model.id,pid));clearRows();alert(`✅ ${selRows.size} נוספו לסל`);}} style={{background:'rgba(255,255,255,.2)',border:'none',borderRadius:8,padding:'7px 12px',cursor:'pointer',color:'#fff',fontSize:12}}>+ סל</button>
            <button onClick={clearRows} style={{background:'rgba(255,255,255,.2)',border:'none',borderRadius:8,padding:'7px 10px',cursor:'pointer',color:'#fff',fontSize:12}}>✕</button>
          </div>
        )}

        {showPaste&&editor&&(
          <div style={{background:'#fff8e1',border:'1px solid #ffcc02',borderRadius:8,padding:12,marginBottom:12}}>
            <div style={{fontSize:12,color:'#795548',marginBottom:4,fontWeight:'bold'}}>📋 סדר: {model.columns.map(c=>c.name).join(' ➔ ')}</div>
            <textarea value={pasteText} onChange={e=>setPasteText(e.target.value)} placeholder="הדבק כאן..." rows={5} style={{width:'100%',border:'1px solid #ddd',borderRadius:6,padding:'8px 10px',fontSize:12,fontFamily:'monospace',resize:'vertical',boxSizing:'border-box',direction:'ltr',color:'#333'}}/>
            <div style={{display:'flex',gap:8,marginTop:8}}>
              <button onClick={submitPaste} style={{...S('#4caf50'),padding:'8px 20px',fontSize:13}}>✓ ייבא</button>
              <button onClick={()=>{setPasteText('');setShowPaste(false);}} style={{...S('#9e9e9e'),padding:'8px 14px',fontSize:13}}>ביטול</button>
            </div>
          </div>
        )}

        <div style={{overflowX:'auto'}}>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:13,minWidth:300}}>
            <thead>
              <tr style={{background:brand.light}}>
                <th style={{width:36,padding:'9px 6px',borderBottom:`2px solid ${brand.color}`}}>
                  <div onClick={()=>{if(selRows.size===filtered.length&&filtered.length>0)clearRows();else setSelRows(new Set(filtered.map(p=>p.id)));}} style={{width:18,height:18,borderRadius:4,border:`2px solid ${brand.color}`,background:selRows.size===filtered.length&&filtered.length>0?brand.color:'transparent',cursor:'pointer',margin:'0 auto',display:'flex',alignItems:'center',justifyContent:'center'}}>
                    {selRows.size===filtered.length&&filtered.length>0&&<span style={{color:'#fff',fontSize:11,fontWeight:'bold'}}>✓</span>}
                  </div>
                </th>
                {visCols.map((col,ci)=>(
                  <th key={col.id} style={{padding:'9px 10px',textAlign:'right',color:'#333',fontWeight:'bold',borderBottom:`2px solid ${brand.color}`,whiteSpace:'nowrap',minWidth:80}}>
                    {editor
                      ?<div style={{display:'flex',alignItems:'center',gap:3}}>
                         <div style={{display:'flex',flexDirection:'column',gap:1,flexShrink:0}}>
                           <button onClick={()=>onMoveCol(col.id,-1)} disabled={ci===0} style={{background:'none',border:'none',cursor:ci===0?'default':'pointer',color:ci===0?'#ccc':'#666',fontSize:10,padding:0,lineHeight:1}}>◀</button>
                           <button onClick={()=>onMoveCol(col.id,1)} disabled={ci===visCols.length-1} style={{background:'none',border:'none',cursor:ci===visCols.length-1?'default':'pointer',color:ci===visCols.length-1?'#ccc':'#666',fontSize:10,padding:0,lineHeight:1}}>▶</button>
                         </div>
                         <input value={col.name} onChange={e=>onColName(col.id,e.target.value)} style={{border:'1px dashed #ccc',borderRadius:3,padding:'2px 5px',fontSize:12,fontWeight:'bold',width:'100%',minWidth:50,background:'transparent',color:'#333'}}/>
                         {admin&&model.columns.length>1&&<button onClick={()=>onDelCol(col.id)} style={{background:'none',border:'none',color:'#e53935',cursor:'pointer',fontSize:16,padding:0,lineHeight:1,flexShrink:0}}>×</button>}
                       </div>
                      :<div onClick={()=>handleSort(col.id)} style={{cursor:'pointer',display:'flex',alignItems:'center',gap:4,userSelect:'none'}}>
                         {col.name}<span style={{fontSize:10,color:sortCol?.id===col.id?brand.color:'#aaa'}}>{si(col.id)}</span>
                       </div>
                    }
                  </th>
                ))}
                <th style={{width:editor?70:40,borderBottom:`2px solid ${brand.color}`}}></th>
              </tr>
            </thead>
            <tbody>
              {filtered.map((p,i)=>{
                const hi=rowHi(p);const isSel=selRows.has(p.id);
                let ref=null;if(hi&&!hiSet){hiSet=true;ref=hiRef;}
                return (
                  <tr key={p.id} ref={ref}
                    style={{background:p.disc?'#ffebee22':isSel?'var(--sel)':p.pinned?'#fff8e1':hi?'var(--hi)':i%2?'var(--r2)':'var(--r1)',transition:'background .15s',cursor:'pointer'}}
                    onClick={()=>toggleRow(p.id)}
                    onMouseEnter={e=>{if(!isSel&&!hi&&!p.pinned&&!p.disc)e.currentTarget.style.background=brand.light+'88';}}
                    onMouseLeave={e=>{if(!isSel&&!hi)e.currentTarget.style.background=p.disc?'#ffebee22':p.pinned?'#fff8e1':i%2?'var(--r2)':'var(--r1)';}}>
                    <td style={{padding:'7px 6px',textAlign:'center'}} onClick={e=>e.stopPropagation()}>
                      <div onClick={()=>toggleRow(p.id)} style={{width:18,height:18,borderRadius:4,border:`2px solid ${isSel?'#25D366':'var(--border)'}`,background:isSel?'#25D366':'transparent',cursor:'pointer',margin:'0 auto',display:'flex',alignItems:'center',justifyContent:'center'}}>
                        {isSel&&<span style={{color:'#fff',fontSize:11,fontWeight:'bold'}}>✓</span>}
                      </div>
                    </td>
                    {visCols.map(col=>{const v=p.values[col.id]||'';return(
                      <td key={col.id} style={{padding:'7px 10px',borderBottom:'1px solid var(--border)',background:cellHi(v)?'var(--hi)':undefined}}>
                        {col.id===visCols[0]?.id&&p.disc&&<span style={{display:'inline-block',background:'#e53935',color:'#fff',fontSize:9,fontWeight:'bold',padding:'1px 5px',borderRadius:4,marginLeft:5}}>⛔ הופסק</span>}
                        {col.id===visCols[0]?.id&&p.pinned&&!p.disc&&<span style={{fontSize:9,color:'#e65100',marginLeft:4}}>📌</span>}
                        {editor
                          ?<input value={v} onChange={e=>onCell(p.id,col.id,e.target.value)} onClick={e=>e.stopPropagation()} style={{border:'none',borderBottom:'1px solid var(--border)',width:'100%',minWidth:50,padding:'2px 4px',fontSize:13,background:'transparent',outline:'none',color:p.disc?'#e53935':'var(--inp)',textDecoration:p.disc?'line-through':''}}/>
                          :<span style={{color:p.disc?'#e53935':'var(--text)',textDecoration:p.disc?'line-through':''}}>{v}</span>}
                      </td>
                    );})}
                    <td style={{padding:'5px 4px',textAlign:'center',borderBottom:'1px solid var(--border)'}} onClick={e=>e.stopPropagation()}>
                      <div style={{display:'flex',gap:2,justifyContent:'center'}}>
                        <button onClick={()=>onAddToCart(brand.id,cat.id,model.id,p.id)} title="הוסף לסל" style={{background:'none',border:'none',cursor:'pointer',fontSize:13}}>🛒</button>
                        {editor&&<>
                          <button onClick={()=>onUpdate({parts:model.parts.map(pp=>pp.id!==p.id?pp:{...pp,pinned:!pp.pinned})})} title={p.pinned?'הסר':'סמן נפוץ'} style={{background:'none',border:'none',cursor:'pointer',fontSize:12}}>{p.pinned?'📌':'☆'}</button>
                          <button onClick={()=>onUpdate({parts:model.parts.map(pp=>pp.id!==p.id?pp:{...pp,disc:!pp.disc})})} title={p.disc?'החזר':'הופסק'} style={{background:'none',border:'none',cursor:'pointer',fontSize:12}}>{p.disc?'✅':'⛔'}</button>
                        </>}
                        {admin&&<button onClick={()=>onDelPart(p.id)} style={{background:'none',border:'none',color:'#e53935',cursor:'pointer',fontSize:13}}>🗑</button>}
                      </div>
                    </td>
                  </tr>
                );
              })}
              {!filtered.length&&<tr><td colSpan={visCols.length+(editor?2:1)} style={{padding:24,textAlign:'center',color:'var(--sub)'}}>{editor?'לחץ "+ שורה" להוספת חלק':'אין חלקים'}</td></tr>}
            </tbody>
          </table>
        </div>
      </div>

      {showReport&&(
        <Modal onClose={()=>setShowReport(false)} title="⚠️ דיווח על שגיאה">
          <div style={{fontSize:13,color:'var(--sub)',marginBottom:12}}>תאר מה לא נכון:</div>
          <textarea value={reportText} onChange={e=>setReportText(e.target.value)} rows={4} placeholder='לדוגמא: מק"ט שגוי עבור מנוע מאוורר...' style={{width:'100%',border:'1px solid var(--border)',borderRadius:8,padding:'10px',fontSize:13,resize:'vertical',color:'var(--inp)',background:'var(--ibg)',boxSizing:'border-box'}}/>
          <div style={{display:'flex',gap:8,marginTop:12}}>
            <button onClick={async()=>{if(!reportText.trim()){alert('כתוב תיאור');return;}await onReport(reportText);setReportText('');setShowReport(false);}} style={{flex:1,...BP('#e65100')}}>📨 שלח</button>
            <button onClick={()=>setShowReport(false)} style={{flex:1,...BS}}>ביטול</button>
          </div>
        </Modal>
      )}
      {showMove&&<MoveModal data={data} currentBid={brand.id} currentCid={cat.id} onMove={onMove} onClose={()=>setShowMove(false)}/>}
      {showCopy&&<CopyModal data={data} currentMid={model.id} onCopy={onCopyPartsFrom} onClose={()=>setShowCopy(false)}/>}
      {showWa&&<WaModal brand={brand} cat={cat} model={model} selRows={selRows} waDefaults={waDefaults} onClose={()=>setShowWa(false)}/>}
    </div>
  );
}

// ── WA MODAL ──
function WaModal({brand,cat,model,selRows,waDefaults,onClose}) {
  const [colSel,setColSel] = useState(new Set(waDefaults||['nameHe','tadPn']));
  const [preview,setPreview] = useState(false);
  const sp = model.parts.filter(p=>selRows.has(p.id));
  const ac = model.columns.filter(c=>colSel.has(c.id));
  const buildMsg = () => {
    const hdr=`🔧 *${brand.name} — ${model.name}*\n📂 ${cat.name}\n${'─'.repeat(26)}`;
    const lines=sp.map((p,i)=>{const vals=ac.map(c=>{const v=(p.values[c.id]||'').trim();return v?`${c.name}: ${v}`:'';}).filter(Boolean);return`*${i+1}.* ${p.disc?'[⛔ הופסק] ':''}${vals.join(' | ')}`;}).join('\n');
    return `${hdr}\n\n${lines}\n\n_סה"כ ${sp.length} חלקים_`;
  };
  return (
    <Modal onClose={onClose} wide title="📱 עריכת הודעת ווצאפ">
      <div style={{marginBottom:14}}>
        <div style={{fontWeight:'bold',fontSize:13,marginBottom:8}}>בחר עמודות:</div>
        <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:8}}>
          <button onClick={()=>setColSel(new Set(model.columns.map(c=>c.id)))} style={S('#607d8b')}>הכל</button>
          <button onClick={()=>setColSel(new Set())} style={S('#9e9e9e')}>נקה</button>
          <button onClick={()=>setColSel(new Set(waDefaults||['nameHe','tadPn']))} style={S('#1565c0')}>ברירת מחדל</button>
        </div>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          {model.columns.map(col=>{const on=colSel.has(col.id);return(<div key={col.id} onClick={()=>setColSel(p=>{const n=new Set(p);on?n.delete(col.id):n.add(col.id);return n;})} style={{padding:'7px 12px',borderRadius:8,border:`2px solid ${on?brand.color:'var(--border)'}`,background:on?brand.color+'22':'var(--ibg)',cursor:'pointer',fontSize:12,color:'var(--text)',userSelect:'none'}}>{on?'✓ ':''}{col.name}</div>);})}
        </div>
      </div>
      <button onClick={()=>setPreview(v=>!v)} style={{...S('#455a64'),marginBottom:8}}>{preview?'הסתר':'הצג תצוגה מקדימה'}</button>
      {preview&&<div style={{background:'#e8f5e9',borderRadius:10,padding:12,fontFamily:'monospace',fontSize:11,color:'#1a1a2a',whiteSpace:'pre-wrap',maxHeight:200,overflowY:'auto',direction:'ltr',textAlign:'left',marginBottom:10,border:'1px solid #c8e6c9'}}>{buildMsg()}</div>}
      <div style={{background:'var(--r2)',borderRadius:8,padding:'8px 12px',marginBottom:14,fontSize:12,color:'var(--sub)'}}>{sp.length} שורות · {ac.length} עמודות</div>
      <div style={{display:'flex',gap:8}}>
        <button onClick={()=>window.open('https://wa.me/?text='+encodeURIComponent(buildMsg()),'_blank')} disabled={!colSel.size} style={{flex:1,...BP(colSel.size?'#25D366':'#aaa')}}>📱 שלח לווצאפ</button>
        <button onClick={onClose} style={{flex:1,...BS}}>ביטול</button>
      </div>
    </Modal>
  );
}

// ── CART MODAL ──
function CartModal({cart,onRemove,onClear,onClose,waDefaults}) {
  const allCols = useMemo(()=>{const s=new Set();cart.forEach(i=>i.columns.forEach(c=>s.add(JSON.stringify({id:c.id,name:c.name}))));return[...s].map(x=>JSON.parse(x));},[cart]);
  const [colSel,setColSel] = useState(new Set(waDefaults));
  const sendWA = () => {
    const ac=allCols.filter(c=>colSel.has(c.id));
    const hdr=`🛒 *סל חלקים*\n${new Date().toLocaleDateString('he-IL')}\n${'─'.repeat(26)}`;
    const lines=cart.map((item,i)=>{const vals=ac.map(c=>{const v=(item.values[c.id]||'').trim();return v?`${c.name}: ${v}`:'';}).filter(Boolean);return`*${i+1}.* [${item.modelName}] ${vals.join(' | ')}`;}).join('\n');
    window.open('https://wa.me/?text='+encodeURIComponent(`${hdr}\n\n${lines}\n\n_${cart.length} פריטים_`),'_blank');
  };
  const exportPDF=()=>{
    const w=window.open('','_blank');
    const rows=cart.map(i=>`<tr><td style="font-weight:bold;background:#f5f5f5">${i.modelName}<br><small>${i.brandName}</small></td>${i.columns.map(c=>`<td>${i.values[c.id]||''}</td>`).join('')}</tr>`).join('');
    w.document.write(`<html dir="rtl"><head><meta charset="UTF-8"><title>סל</title><style>body{font-family:Arial;padding:20px;direction:rtl}table{border-collapse:collapse;width:100%}th{background:#1565c0;color:#fff;padding:8px 10px;text-align:right}td{border:1px solid #ddd;padding:6px 10px;font-size:13px}</style></head><body><h2 style="color:#1565c0">🛒 סל חלקים — ${new Date().toLocaleDateString('he-IL')}</h2><p>${cart.length} פריטים</p><table><thead><tr><th>דגם</th>${cart[0]?.columns.map(c=>`<th>${c.name}</th>`).join('')||''}</tr></thead><tbody>${rows}</tbody></table><script>window.onload=()=>window.print();<\/script></body></html>`);
    w.document.close();
  };
  return (
    <Modal onClose={onClose} wide title="🛒 סל חלקים">
      {!cart.length?<div style={{textAlign:'center',padding:40,color:'var(--sub)'}}>הסל ריק<br/><small>לחץ 🛒 ליד חלק להוספה</small></div>
      :<>
        <div style={{maxHeight:'35vh',overflowY:'auto',marginBottom:12}}>
          {cart.map(item=>(
            <div key={item.id} style={{display:'flex',gap:10,padding:'9px 12px',borderRadius:8,background:'var(--r2)',marginBottom:6,alignItems:'center'}}>
              <span style={{background:item.brandColor,color:'#fff',padding:'2px 7px',borderRadius:4,fontSize:10,fontWeight:'bold',flexShrink:0}}>{item.brandName}</span>
              <div style={{flex:1}}>
                <div style={{fontWeight:'bold',fontSize:12}}>{item.modelName}</div>
                <div style={{fontSize:11,color:'var(--sub)'}}>{item.columns.filter(c=>item.values[c.id]?.trim()).map(c=>`${c.name}: ${item.values[c.id]}`).join(' · ')}</div>
              </div>
              <button onClick={()=>onRemove(item.id)} style={{background:'none',border:'none',color:'#e53935',cursor:'pointer',fontSize:16}}>🗑</button>
            </div>
          ))}
        </div>
        <div style={{marginBottom:12}}>
          <div style={{fontWeight:'bold',fontSize:12,color:'var(--sub)',marginBottom:6}}>עמודות לווצאפ:</div>
          <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
            {allCols.map(c=>{const on=colSel.has(c.id);return(<div key={c.id} onClick={()=>setColSel(p=>{const n=new Set(p);on?n.delete(c.id):n.add(c.id);return n;})} style={{padding:'5px 10px',borderRadius:6,border:`2px solid ${on?'#1565c0':'var(--border)'}`,background:on?'#e3f2fd':'var(--ibg)',cursor:'pointer',fontSize:12,color:'var(--text)',userSelect:'none'}}>{on?'✓ ':''}{c.name}</div>);})}
          </div>
        </div>
        <div style={{display:'flex',gap:8}}>
          <button onClick={exportPDF} style={{flex:1,...BP('#546e7a')}}>🖨️ PDF</button>
          <button onClick={sendWA} style={{flex:1,...BP('#25D366')}}>📱 ווצאפ</button>
          <button onClick={onClear} style={{...S('#e53935'),padding:'10px 14px'}}>נקה</button>
        </div>
      </>}
    </Modal>
  );
}

// ── MOVE / COPY ──
function MoveModal({data,currentBid,currentCid,onMove,onClose}) {
  const [toBid,setToBid] = useState(currentBid);const [toCid,setToCid] = useState('');

      {brand&&brand.categories.map(c=><div key={c.id} onClick={()=>setToCid(c.id)} style={{padding:'10px 14px',borderRadius:8,border:`2px solid ${toCid===c.id?brand.color:'var(--border)'}`,marginBottom:6,cursor:'pointer',background:toCid===c.id?brand.light:'var(--ibg)',color:'var(--text)',fontSize:13,fontWeight:toCid===c.id?'bold':'normal'}}>{c.name}</div>)}
      <div style={{display:'flex',gap:8,marginTop:12}}>
        <button onClick={()=>{if(!toCid){alert('בחר קטגוריה');return;}if(toBid===currentBid&&toCid===currentCid){alert('אותה קטגוריה');return;}onMove(toBid,toCid);onClose();}} style={{flex:1,...BP('#1565c0')}}>✓ העבר</button>
        <button onClick={onClose} style={{flex:1,...BS}}>ביטול</button>
      </div>
    </Modal>
  );
}

            <span style={{background:b.color,color:'#fff',padding:'2px 8px',borderRadius:4,fontSize:11,fontWeight:'bold'}}>{b.name}</span>

        <button onClick={onClose} style={{flex:1,...BS}}>ביטול</button>

}

// ── BULK MOVE ──
function BulkMoveModal({data,onMove,onClose}) {
  const [sel,setSel]=useState(new Set());const [toBid,setToBid]=useState('');const [toCid,setToCid]=useState('');const [q,setQ]=useState('');

        <button onClick={()=>setSel(new Set(filtered.map(x=>key(x.bid,x.cid,x.mid))))} style={S('#607d8b')}>בחר הכל</button>

      </div>
      <div style={{maxHeight:'28vh',overflowY:'auto',border:'1px solid var(--border)',borderRadius:8,marginBottom:12}}>
        {!all.length&&<div style={{padding:20,textAlign:'center',color:'var(--sub)'}}>אין דגמים</div>}

            <div style={{width:18,height:18,borderRadius:4,border:`2px solid ${isSel?'#1565c0':'var(--border)'}`,background:isSel?'#1565c0':'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>{isSel&&<span style={{color:'#fff',fontSize:11,fontWeight:'bold'}}>✓</span>}</div>
            <span style={{background:x.color,color:'#fff',padding:'2px 7px',borderRadius:4,fontSize:10,fontWeight:'bold',flexShrink:0}}>{x.bname}</span>
            <span style={{fontWeight:'bold',color:'var(--text)',flex:1,fontSize:13}}>{x.mname}</span>
            <span style={{color:'var(--sub)',fontSize:11}}>{x.cname}</span>

        );})}

      <div style={{display:'flex',gap:8}}>
        <button onClick={()=>{if(!sel.size){alert('בחר דגמים');return;}if(!toCid){alert('בחר יעד');return;}const sels=[...sel].map(k=>{const[bid,cid,mid]=k.split(SEP);return{bid,cid,mid};});onMove(sels,toBid,toCid);alert(`✅ ${sels.length} הועברו`);onClose();}} style={{flex:1,...BP('#1565c0')}}>✓ העבר{sel.size>0?` (${sel.size})`:''}</button>
        <button onClick={onClose} style={{flex:1,...BS}}>ביטול</button>
      </div>
    </Modal>
  );
}

// ── BULK DELETE ──
function BulkDelModal({data,onDelete,onClose}) {
  const [sel,setSel]=useState(new Set());const [q,setQ]=useState('');
  const all=[];data.brands.forEach(b=>b.categories.forEach(c=>c.models.forEach(m=>all.push({bid:b.id,cid:c.id,mid:m.id,bname:b.name,cname:c.name,mname:m.name,color:b.color,parts:(m.parts||[]).length}))));
  const filtered=q.trim()?all.filter(x=>[x.mname,x.bname,x.cname].some(s=>s.toLowerCase().includes(q.toLowerCase()))):all;
  const key=(bid,cid,mid)=>`${bid}${SEP}${cid}${SEP}${mid}`;
  const toggle=k=>setSel(p=>{const n=new Set(p);n.has(k)?n.delete(k):n.add(k);return n;});
  return (
    <Modal onClose={onClose} wide title="🗑 מחיקה מרובה">
      <div style={{background:'#ffebee',borderRadius:8,padding:'10px 14px',marginBottom:12,fontSize:12,color:'#c62828',fontWeight:'bold'}}>⚠ המחיקה לצמיתות!</div>
      <div style={{display:'flex',gap:8,marginBottom:12,flexWrap:'wrap'}}>
        <input value={q} onChange={e=>setQ(e.target.value)} placeholder="🔍 חפש..." style={{flex:1,minWidth:100,...IS,padding:'7px 12px'}}/>
        <button onClick={()=>setSel(new Set(filtered.map(x=>key(x.bid,x.cid,x.mid))))} style={S('#607d8b')}>בחר הכל</button>
        <button onClick={()=>setSel(new Set())} style={S('#9e9e9e')}>נקה</button>
      </div>
      <div style={{maxHeight:'38vh',overflowY:'auto',border:'1px solid var(--border)',borderRadius:8,marginBottom:12}}>
        {!all.length&&<div style={{padding:30,textAlign:'center',color:'var(--sub)'}}>אין דגמים</div>}
        {!filtered.length&&all.length>0&&<div style={{padding:20,textAlign:'center',color:'var(--sub)'}}>אין תוצאות</div>}
        {filtered.map(x=>{const k=key(x.bid,x.cid,x.mid);const isSel=sel.has(k);return(
          <div key={k} onClick={()=>toggle(k)} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',cursor:'pointer',borderBottom:'1px solid var(--border)',background:isSel?'#ffebee':'var(--card)',userSelect:'none'}}>
            <div style={{width:20,height:20,borderRadius:4,border:`2px solid ${isSel?'#c62828':'var(--border)'}`,background:isSel?'#c62828':'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>{isSel&&<span style={{color:'#fff',fontSize:13,fontWeight:'bold'}}>✓</span>}</div>
            <span style={{background:x.color,color:'#fff',padding:'2px 7px',borderRadius:4,fontSize:10,fontWeight:'bold',flexShrink:0}}>{x.bname}</span>
            <span style={{fontWeight:'bold',color:'var(--text)',flex:1,fontSize:13}}>{x.mname}</span>
            <span style={{color:'var(--sub)',fontSize:11}}>{x.cname}</span>
            <span style={{color:'#e53935',fontSize:11,fontWeight:'bold',flexShrink:0}}>{x.parts} חלקים</span>
          </div>
        );})}
      </div>
      {sel.size>0&&<div style={{background:'#ffebee',borderRadius:8,padding:'8px 14px',marginBottom:10,fontSize:13,color:'#c62828',fontWeight:'bold'}}>🗑 {sel.size} יימחקו לצמיתות</div>}
      <div style={{display:'flex',gap:8}}>
        <button onClick={()=>{if(!sel.size){alert('לא נבחרו');return;}const sels=[...sel].map(k=>{const[bid,cid,mid]=k.split(SEP);return{bid,cid,mid};});onDelete(sels);onClose();}} style={{flex:1,...BP(sel.size?'#c62828':'#aaa')}}>🗑 מחק{sel.size>0?` (${sel.size})`:''}</button>
        <button onClick={onClose} style={{flex:1,...BS}}>ביטול</button>
      </div>
    </Modal>
  );
}

// ── XLS IMPORT ──
function XlsModal({data,onImport,onClose}) {
  const [rows,setRows]=useState([]);const [fn,setFn]=useState('');const [toBid,setToBid]=useState(data.brands[0]?.id||'');const [toCid,setToCid]=useState(data.brands[0]?.categories[0]?.id||'');
  const [cm,setCm]=useState({model:0,nameHe:1,tadPn:2,nameEn:3,mfgPn:4});const [step,setStep]=useState(1);const [groups,setGroups]=useState([]);const [excl,setExcl]=useState(new Set());
  const tb=data.brands.find(b=>b.id===toBid);
  const parseFile=e=>{const f=e.target.files[0];if(!f)return;setFn(f.name);const r=new FileReader();r.onload=ev=>{const wb=XLSX.read(ev.target.result,{type:'binary'});const ws=wb.Sheets[wb.SheetNames[0]];const all=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});const fc=String(all[0]?.[0]||'').toLowerCase();const dr=(fc.includes('דגם')||fc.includes('model'))?all.slice(1):all;setRows(dr.filter(r=>r.some(c=>String(c).trim())));setStep(2);};r.readAsBinaryString(f);e.target.value='';};
  const buildPreview=()=>{const g={};rows.forEach(r=>{const mn=String(r[cm.model]||'').trim();if(!mn)return;g[mn]=(g[mn]||0)+1;});setGroups(Object.entries(g));setExcl(new Set());setStep(3);};
  const colLbl=i=>{const s=rows.slice(0,3).map(r=>String(r[i]||'').trim()).filter(Boolean).join(', ');return`עמודה ${i+1}${s?' ('+s.slice(0,22)+')':''}`;};
  const maxC=rows[0]?rows[0].length:6;const included=groups.filter(([n])=>!excl.has(n));
  return (
    <Modal onClose={onClose} wide title="📥 ייבוא מ-Excel">
      <div style={{display:'flex',gap:4,marginBottom:20}}>
        {['1. העלאה','2. מיפוי','3. אישור'].map((s,i)=>(
          <div key={i} style={{flex:1,textAlign:'center',padding:'6px 0',borderRadius:6,fontSize:12,fontWeight:'bold',background:step===i+1?'#1565c0':step>i+1?'#4caf50':'var(--r2)',color:step>=i+1?'#fff':'var(--sub)'}}>{s}</div>
        ))}
      </div>
      {step===1&&<label style={{display:'block',border:'2px dashed #1565c0',borderRadius:12,padding:'32px 20px',textAlign:'center',cursor:'pointer',background:'var(--r2)'}}>
        <div style={{fontSize:40,marginBottom:8}}>📊</div>
        <div style={{fontWeight:'bold',color:'#1565c0',fontSize:15,marginBottom:4}}>לחץ לבחירת קובץ</div>
        <div style={{color:'var(--sub)',fontSize:12}}>XLSX, XLS, CSV</div>
        <input type="file" accept=".xlsx,.xls,.csv" onChange={parseFile} style={{display:'none'}}/>
      </label>}
      {step===2&&<div>
        <div style={{background:'#e8f5e9',borderRadius:8,padding:10,marginBottom:12,fontSize:12,color:'#2e7d32'}}>✓ {fn} — {rows.length} שורות</div>
        {[['model','שם הדגם (מפתח)'],['nameHe','שם בעברית'],['tadPn','מק"ט תדיראן'],['nameEn','שם באנגלית'],['mfgPn','מק"ט יצרן']].map(([k,lbl])=>(
          <div key={k} style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
            <span style={{width:130,fontSize:12,color:'var(--sub)',flexShrink:0}}>{lbl}:</span>
            <select value={cm[k]} onChange={e=>setCm(p=>({...p,[k]:Number(e.target.value)}))} style={{flex:1,border:'1px solid var(--border)',borderRadius:6,padding:'6px 10px',fontSize:12,color:'var(--inp)',background:'var(--ibg)'}}>
              {Array.from({length:maxC},(_,i)=>i).map(i=><option key={i} value={i}>{colLbl(i)}</option>)}
            </select>
          </div>
        ))}
        <div style={{fontWeight:'bold',fontSize:13,marginTop:12,marginBottom:8}}>ייבא אל:</div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:8}}>{data.brands.map(b=><button key={b.id} onClick={()=>{setToBid(b.id);setToCid(b.categories[0]?.id||'');}} style={{padding:'7px 14px',borderRadius:20,border:`2px solid ${toBid===b.id?b.color:'var(--border)'}`,background:toBid===b.id?b.color:'var(--ibg)',color:toBid===b.id?'#fff':'var(--text)',cursor:'pointer',fontWeight:'bold',fontSize:13}}>{b.name}</button>)}</div>
        {tb&&<div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,marginBottom:14}}>{tb.categories.map(c=><div key={c.id} onClick={()=>setToCid(c.id)} style={{padding:'8px 12px',borderRadius:8,border:`2px solid ${toCid===c.id?tb.color:'var(--border)'}`,cursor:'pointer',background:toCid===c.id?tb.light:'var(--ibg)',fontSize:12,color:'var(--text)',fontWeight:toCid===c.id?'bold':'normal'}}>{c.name}</div>)}</div>}
        <div style={{display:'flex',gap:8}}>
          <button onClick={buildPreview} disabled={!toCid} style={{flex:1,...BP(toCid?'#1565c0':'#aaa')}}>הבא ▶</button>
          <button onClick={()=>setStep(1)} style={{...BS,padding:'10px 16px',borderRadius:8}}>חזור</button>
        </div>
      </div>}
      {step===3&&<div>
        <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:8}}>
          <div style={{fontWeight:'bold',fontSize:13}}>בחר דגמים ({groups.length}):</div>
          <button onClick={()=>setExcl(new Set())} style={{...S('#4caf50'),marginRight:'auto'}}>בחר הכל</button>
          <button onClick={()=>setExcl(new Set(groups.map(([n])=>n)))} style={S('#9e9e9e')}>בטל הכל</button>
        </div>
        <div style={{maxHeight:'34vh',overflowY:'auto',border:'1px solid var(--border)',borderRadius:8,marginBottom:10}}>
          {groups.map(([name,count])=>{const isEx=excl.has(name);const exists=tb?.categories.find(c=>c.id===toCid)?.models.some(m=>m.name===name);return(
            <div key={name} onClick={()=>setExcl(p=>{const n=new Set(p);isEx?n.delete(name):n.add(name);return n;})} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 12px',cursor:'pointer',borderBottom:'1px solid var(--border)',background:isEx?'var(--r2)':'var(--card)',opacity:isEx?.45:1}}>
              <div style={{width:18,height:18,borderRadius:4,border:`2px solid ${!isEx?'#1565c0':'var(--border)'}`,background:!isEx?'#1565c0':'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>{!isEx&&<span style={{color:'#fff',fontSize:11,fontWeight:'bold'}}>✓</span>}</div>
              <span style={{flex:1,fontWeight:'bold',color:'var(--text)',fontSize:13}}>{name}</span>
              <span style={{color:'var(--sub)',fontSize:11}}>{count} חלקים</span>
              {exists?<span style={{background:'#fff3e0',color:'#e65100',padding:'1px 6px',borderRadius:4,fontSize:10}}>יתווסף</span>:<span style={{background:'#e8f5e9',color:'#2e7d32',padding:'1px 6px',borderRadius:4,fontSize:10}}>חדש</span>}
            </div>
          );})}
        </div>
        <div style={{background:'#f3e5f5',borderRadius:8,padding:'10px 14px',marginBottom:12,fontSize:13,color:'#6a1b9a'}}>
          יוייבאו: <strong>{included.length} דגמים</strong> עם <strong>{included.reduce((s,[,c])=>s+c,0).toLocaleString()} חלקים</strong>
        </div>
        <div style={{display:'flex',gap:8}}>
          <button onClick={()=>{const res=onImport(rows,cm,toBid,toCid,excl);alert(`✅ ${res.models} דגמים, ${res.parts.toLocaleString()} חלקים`);onClose();}} disabled={!included.length} style={{flex:1,...BP(included.length?'#4caf50':'#aaa')}}>✅ ייבא</button>
          <button onClick={()=>setStep(2)} style={{...BS,padding:'10px 16px',borderRadius:8}}>חזור</button>
        </div>
      </div>}
    </Modal>
  );
}

// ── BRAND MGR ──
function BrandMgr({data,onClose,onSave}) {
  const [brands,setBrands] = useState(JSON.parse(JSON.stringify(data.brands)));
  const add=()=>setBrands(b=>[...b,{id:gid(),name:'מותג חדש',color:'#607d8b',light:'#eceff1',categories:DCATS()}]);
  const upd=(id,k,v)=>setBrands(b=>b.map(x=>x.id!==id?x:{...x,[k]:v}));
  const del=id=>{if(confirm('למחוק?'))setBrands(b=>b.filter(x=>x.id!==id));};
  return (
    <Modal onClose={onClose} wide title="⚙ ניהול מותגים">
      <div style={{maxHeight:'50vh',overflowY:'auto',marginBottom:12}}>
        {brands.map(b=>(
          <div key={b.id} style={{border:'1px solid var(--border)',borderRadius:10,padding:12,marginBottom:10,borderRight:`5px solid ${b.color}`}}>
            <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
              <input value={b.name} onChange={e=>upd(b.id,'name',e.target.value)} style={{border:'1px solid var(--border)',borderRadius:6,padding:'6px 10px',fontSize:14,fontWeight:'bold',flex:'1 1 100px',color:'var(--inp)',background:'var(--ibg)'}}/>
              <div style={{display:'flex',alignItems:'center',gap:6}}>
                <label style={{fontSize:12,color:'var(--sub)'}}>צבע:</label>
                <input type="color" value={b.color} onChange={e=>{const c=e.target.value;upd(b.id,'color',c);upd(b.id,'light',c+'22');}} style={{border:'none',borderRadius:4,height:34,width:44,cursor:'pointer'}}/>
              </div>
              <button onClick={()=>del(b.id)} style={{background:'none',border:'1px solid #e53935',color:'#e53935',borderRadius:6,padding:'6px 12px',cursor:'pointer',fontSize:12}}>מחק</button>
            </div>
            <div style={{fontSize:11,color:'var(--sub)',marginTop:6}}>{b.categories.reduce((s,c)=>s+c.models.length,0)} דגמים</div>
          </div>
        ))}
      </div>
      <button onClick={add} style={{width:'100%',padding:10,background:'#607d8b',color:'#fff',border:'none',borderRadius:8,cursor:'pointer',fontWeight:'bold',marginBottom:12}}>+ הוסף מותג</button>
      <div style={{display:'flex',gap:8}}>
        <button onClick={()=>onSave(brands)} style={{flex:1,...BP('#1565c0')}}>✓ שמור</button>
        <button onClick={onClose} style={{flex:1,...BS}}>ביטול</button>
      </div>
    </Modal>
  );
}

// ── SETTINGS ──
function SettingsModal({data,onSave,onClose}) {
  const [cur,setCur]=useState('');const [an,setAn]=useState('');const [en,setEn]=useState('');const [vn,setVn]=useState('');const [err,setErr]=useState('');
  const [wt,setWt]=useState(data.welcomeTitle||'');const [ws,setWs]=useState(data.welcomeSub||'');const [disc,setDisc]=useState(data.disclaimer||'');
  const [news,setNews]=useState(data.news||'');const [wd,setWd]=useState(data.waDefaults||['nameHe','tadPn']);
  const allCols=data.brands[0]?.categories[0]?.models[0]?.columns||DCOLS();
  const submit=()=>{if(cur!==data.pass){setErr('סיסמת מנהל שגויה');return;}if(an&&an.length<4){setErr('לפחות 4 תווים');return;}onSave({...data,pass:an||data.pass,editorPass:en||data.editorPass||'editor1234',viewerPass:vn||data.viewerPass||'tadir123',waDefaults:wd,welcomeTitle:wt,welcomeSub:ws,disclaimer:disc,news});};
  return (
    <Modal onClose={onClose} wide title="🔑 הגדרות מנהל">
      <div style={{fontWeight:'bold',fontSize:13,color:'var(--sub)',marginBottom:10,borderBottom:'1px solid var(--border)',paddingBottom:8}}>🔐 סיסמאות</div>
      {[['סיסמת מנהל נוכחית (לאימות)',cur,setCur,''],['סיסמת מנהל חדשה',an,setAn,''],['סיסמת עורך חדשה',en,setEn,`נוכחית: ${data.editorPass||'editor1234'}`],['סיסמת צופה חדשה',vn,setVn,`נוכחית: ${data.viewerPass||'tadir123'}`]].map(([l,v,s,h])=>(
        <div key={l} style={{marginBottom:10}}>
          <div style={{fontSize:12,color:'var(--sub)',marginBottom:4}}>{l}{h&&<span style={{color:'#aaa',fontSize:11,marginRight:6}}>({h})</span>}</div>
          <input type="password" value={v} onChange={e=>s(e.target.value)} style={IS}/>
        </div>
      ))}
      {err&&<div style={{color:'red',fontSize:12,marginBottom:8}}>{err}</div>}
      <div style={{fontWeight:'bold',fontSize:13,color:'var(--sub)',margin:'12px 0 10px',borderBottom:'1px solid var(--border)',paddingBottom:8}}>📱 ברירת מחדל לווצאפ</div>
      <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:14}}>
        {allCols.map(c=>{const on=wd.includes(c.id);return(<div key={c.id} onClick={()=>setWd(p=>on?p.filter(x=>x!==c.id):[...p,c.id])} style={{padding:'6px 12px',borderRadius:8,border:`2px solid ${on?'#1565c0':'var(--border)'}`,background:on?'#e3f2fd':'var(--ibg)',cursor:'pointer',fontSize:12,color:'var(--text)',userSelect:'none'}}>{on?'✓ ':''}{c.name}</div>);})}
      </div>
      <div style={{fontWeight:'bold',fontSize:13,color:'var(--sub)',marginBottom:10,borderBottom:'1px solid var(--border)',paddingBottom:8}}>🏠 מסך כניסה ושורת חדשות</div>
      {[['כותרת ראשית',wt,setWt,'textarea'],['כותרת משנה',ws,setWs,'input'],['הצהרת אחריות',disc,setDisc,'textarea'],['שורת חדשות',news,setNews,'textarea']].map(([l,v,s,t])=>(
        <div key={l} style={{marginBottom:10}}>
          <div style={{fontSize:12,color:'var(--sub)',marginBottom:4}}>{l}</div>
          {t==='textarea'?<textarea value={v} onChange={e=>s(e.target.value)} rows={2} style={{...IS,height:'auto',resize:'vertical'}}/>:<input value={v} onChange={e=>s(e.target.value)} style={IS}/>}
        </div>
      ))}
      <div style={{display:'flex',gap:8,marginTop:14}}>
        <button onClick={submit} style={{flex:1,...BP('#1565c0')}}>שמור הכל</button>
        <button onClick={onClose} style={{flex:1,...BS}}>ביטול</button>
      </div>
    </Modal>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
